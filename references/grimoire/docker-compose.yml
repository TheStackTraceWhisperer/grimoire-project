services:
  postgres:
    image: postgres:16-alpine
    container_name: grimoire-db
    environment:
      POSTGRES_DB: grimoire
      POSTGRES_USER: grimoire
      POSTGRES_PASSWORD: grimoire
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grimoire"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: grimoire-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - keycloak
      - server
      - web

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: grimoire-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/grimoire
      KC_DB_USERNAME: grimoire
      KC_DB_PASSWORD: grimoire
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: grimoire
      KEYCLOAK_ADMIN_PASSWORD: grimoire
      KC_HOSTNAME: https://auth.samuelhyman.com
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    command:
      - start
      - --import-realm
        #      - --optimized
    volumes:
      - ./docs/keycloak/grimoire-realm.json:/opt/keycloak/data/import/grimoire-realm.json:ro
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30

  server:
    build:
      context: .
      dockerfile: ./grimoire-server/Dockerfile
    container_name: grimoire-server
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres:5432/grimoire
      DATASOURCES_DEFAULT_USERNAME: grimoire
      DATASOURCES_DEFAULT_PASSWORD: grimoire
      MICRONAUT_SECURITY_TOKEN_JWT_SIGNATURES_JWKS_KEYCLOAK_URL: http://keycloak:8080/realms/grimoire/protocol/openid-connect/certs
    expose:
      - "8888"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./grimoire-web/Dockerfile
    container_name: grimoire-web
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres:5432/grimoire
      DATASOURCES_DEFAULT_USERNAME: grimoire
      DATASOURCES_DEFAULT_PASSWORD: grimoire
      MICRONAUT_SECURITY_OAUTH2_CLIENTS_KEYCLOAK_CLIENT_ID: grimoire-web-client
      MICRONAUT_SECURITY_OAUTH2_CLIENTS_KEYCLOAK_CLIENT_SECRET: web-secret
      MICRONAUT_SECURITY_OAUTH2_CLIENTS_KEYCLOAK_OPENID_ISSUER: http://keycloak:8080/realms/grimoire
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
