<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Grimoire</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Grimoire</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/account}">Account</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/characters}">Characters</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h1>Account Dashboard</h1>
                
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Account Information</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Username:</strong> <span th:text="${account.username}"></span></p>
                        <p><strong>Account Created:</strong> <span th:text="${#temporals.format(account.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
                        <p><strong>Characters:</strong> <span th:text="${#lists.size(characters)}"></span> / 5</p>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Actions</h5>
                    </div>
                    <div class="card-body">
                        <a th:href="@{/characters}" class="btn btn-primary">Manage Characters</a>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Recent Characters</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(characters)}" class="text-muted">
                            No characters created yet.
                        </div>
                        <ul class="list-group" th:unless="${#lists.isEmpty(characters)}">
                            <li class="list-group-item" th:each="character : ${characters}">
                                <strong th:text="${character.name}"></strong> 
                                - Level <span th:text="${character.level}"></span>
                                <span class="text-muted"> (Last played: <span th:text="${#temporals.format(character.lastPlayedAt, 'yyyy-MM-dd HH:mm')}"></span>)</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
