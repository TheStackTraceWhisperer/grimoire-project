<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters - Grimoire</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Grimoire</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/account}">Account</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/characters}">Characters</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h1>My Characters</h1>
                
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                </div>
                
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}"></span>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5>Character List</h5>
                        <span class="badge bg-secondary">
                            <span th:text="${#lists.size(characters)}"></span> / 5
                        </span>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(characters)}" class="text-center text-muted py-4">
                            <p>No characters created yet.</p>
                            <p class="small">Create your first character below!</p>
                        </div>
                        
                        <div class="table-responsive" th:unless="${#lists.isEmpty(characters)}">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Level</th>
                                        <th>Last Zone</th>
                                        <th>Last Played</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="character : ${characters}">
                                        <td><strong th:text="${character.name}"></strong></td>
                                        <td th:text="${character.level}"></td>
                                        <td th:text="${character.lastZone}"></td>
                                        <td th:text="${#temporals.format(character.lastPlayedAt, 'yyyy-MM-dd HH:mm')}"></td>
                                        <td>
                                            <form th:action="@{/characters/delete}" method="post" class="d-inline">
                                                <input type="hidden" name="characterId" th:value="${character.id}">
                                                <button type="submit" class="btn btn-sm btn-danger" 
                                                        onclick="return confirm('Are you sure you want to delete this character?')">
                                                    Delete
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Create New Character</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/characters/create}" method="post">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label for="name" class="form-label">Character Name</label>
                                    <input type="text" class="form-control" id="name" name="name" 
                                           required minlength="3" maxlength="20" 
                                           placeholder="Enter character name">
                                    <div class="form-text">Between 3 and 20 characters</div>
                                </div>
                                <div class="col-md-4 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary w-100">Create Character</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
