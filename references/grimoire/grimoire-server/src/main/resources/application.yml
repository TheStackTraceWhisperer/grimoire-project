micronaut:
  application:
    name: grimoire-server
  server:
    port: 8080
  security:
    enabled: true
    token:
      jwt:
        enabled: true
        signatures:
          jwks:
            keycloak:
              url: http://localhost:9000/realms/grimoire/protocol/openid-connect/certs
    
# Game server configuration
game:
  server:
    port: 8888
    ssl:
      enabled: true
      keystore: classpath:certs/server-keystore.p12
      keystorePassword: grimoire
      keystoreType: PKCS12
  # Tunable game parameters
  tuning:
    attackRange: 50.0
    playerSpeed: 5.0
    spatialGridCellSize: 64
    sessionValidityMinutes: 60
    autoSaveIntervalSeconds: 300
    npcAggroRange: 100.0
    npcSpeed: 3.0
    attackCooldownTicks: 20
    npcLeashRadius: 200.0
    
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/grimoire
    driverClassName: org.postgresql.Driver
    username: grimoire
    password: grimoire
    dialect: POSTGRES
    schema-generate: CREATE_DROP
    
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
